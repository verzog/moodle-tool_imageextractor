name: Moodle CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready" --health-interval=10s
          --health-timeout=5s --health-retries=3
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: root
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping" --health-interval=10s
          --health-timeout=5s --health-retries=3
    strategy:
      fail-fast: false
      matrix:
        # Moodle 5.0 requires PHP 8.2+; 8.4 is supported on 5.0 and later.
        # Moodle 5.2 drops PHP 8.2, so that combination is excluded below.
        # The branches here must cover everything version.php declares in
        # $plugin->supported (currently 5.0-5.2).
        php: ['8.2', '8.3', '8.4']
        moodle-branch: ['MOODLE_500_STABLE', 'MOODLE_501_STABLE', 'MOODLE_502_STABLE']
        database: ['pgsql', 'mariadb']
        exclude:
          # Moodle 5.2 requires PHP 8.3 or later.
          - php: '8.2'
            moodle-branch: 'MOODLE_502_STABLE'

    env:
      # Australian timezone so date/time tests respect AEST/AWST offsets.
      TZ: Australia/Sydney

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zip, xml, gd, mbstring, sodium, intl, soap, xmlrpc
          ini-values: max_input_vars=5000
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$(pwd)/ci/bin" >> "$GITHUB_PATH"
          echo "$(pwd)/ci/vendor/bin" >> "$GITHUB_PATH"
          sudo locale-gen en_AU.UTF-8
      - name: Install Moodle
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: PHP Copy/Paste Detector
        continue-on-error: true
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcpd

      - name: PHP Mess Detector
        continue-on-error: true
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        # Proprietary plugin: exclude the GPL boilerplate sniff (see .phpcs.xml /
        # CLAUDE.md). moodle-plugin-ci forces --standard=moodle and ignores the
        # repo .phpcs.xml, so the exclusion is passed on the command line here.
        run: moodle-plugin-ci phpcs --max-warnings 0 --exclude moodle.Files.BoilerplateComment

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validating
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit --fail-on-warning

      - name: Behat features
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome
